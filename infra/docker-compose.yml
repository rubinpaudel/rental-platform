name: rental-platform

services:
  postgres:
    image: postgres:17
    container_name: rental-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: rental
      POSTGRES_PASSWORD: rental
      POSTGRES_DB: rental
    ports:
      - '5433:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U rental -d rental']
      interval: 5s
      timeout: 5s
      retries: 5

  # Local S3 emulation. We use MinIO (not LocalStack): one small container,
  # exact S3 API, path-style addressing. Prod uses real AWS S3.
  minio:
    image: minio/minio:latest
    container_name: rental-minio
    restart: unless-stopped
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000' # S3 API
      - '9001:9001' # Web console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 5

  # One-shot: create the local bucket so the storage health check passes.
  minio-init:
    image: minio/mc:latest
    container_name: rental-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/rental-platform-local &&
      echo 'bucket ready';
      "

  # Local SMTP sink — captures all outbound mail (verification, invites).
  # Web UI: http://localhost:8025
  mailpit:
    image: axllent/mailpit:latest
    container_name: rental-mailpit
    restart: unless-stopped
    ports:
      - '1025:1025' # SMTP
      - '8025:8025' # Web UI
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

volumes:
  postgres-data:
  minio-data:
