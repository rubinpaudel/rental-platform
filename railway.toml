# Railway deploy config for the API service.
#
# Build: Docker (monorepo-aware Dockerfile at apps/api/Dockerfile).
# A Postgres add-on on the same project injects DATABASE_URL.
# All other env vars (S3_*, API_PORT, NODE_ENV) are set in the
# Railway service variables — see .env.example for the contract.
#
# `git push` to main → Railway builds the Dockerfile and deploys.
# The deploy is only marked healthy once GET /health returns 200.

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/api/Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
